  section: 1 A FORTUNATE SON
  page: 9
  location: 149
  color: pink
  text: 'I had absolutely no empathy for Calley, and was disgusted and abhorred by
    what happened there. Most of my classmates were of the same mind, with one possible
    exception: Captain Ernie Medina, Lieutenant Calley’s company commander. When Calley
    was charged, Medina dropped out of the course and retained F. Lee Bailey as his
    attorney. I knew Ernie pretty well. In fact, we often sat next to each other during
    classes in Infantry Hall, and I was invited to Thanksgiving dinner at his family
    quarters. It was hard to believe that Ernie was involved in the massacre at My
    Lai, but he was in fact the company commander and senior officer on the ground.
    Captain Medina was eventually court-martialed, but not convicted. Nonetheless,
    realizing his career was over, he resigned his commission and left the Army. He
    later took a job at an aviation company owned by his lawyer, F. Lee Bailey.'
