  text: I deployed with Company D of the 1st Special Forces Group from Fort Bragg
    in October of 1966. The company was redesignated as the 46th Special Forces Company
    during my tour. In partnership with the Thai Special Forces, our detachments spread
    throughout the large country to quell a growing threat from Communist insurgents
    in the northeastern and southern regions of the country.
