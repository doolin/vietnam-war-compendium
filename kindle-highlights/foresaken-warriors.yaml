  text: In early 1967, Lieutenant Colonel Kollat was assigned to lead a Task Force
    that would train the first Thai unit to deploy to Vietnam, the “Queen’s Cobras”
    Regiment. LTC Kollat, the Task Force Slick Commander, selected me to become a
    member of the Task Force Infantry Training Committee. The Regiment received its
    initial training at Chon Buri, south of Bangkok, and completed predeployment training
    at Kanchanaburi, the site of the famous Bridge over the River Kwai.
