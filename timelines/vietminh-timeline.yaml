timeline:
  - date: "May 10, 1941"
    tier: 0
    event: "Viet Nam Doc Lap Dong Minh Hoi (Viet Minh) formed by Ho Chi Minh to coordinate resistance activities."

  - date: "Sept. 2, 1945"
    tier: 0
    event: "Japan formally surrenders to the Allies; Ho Chi Minh declares the independence of Vietnam in Hanoi."

  - date: "Dec. 19/20, 1946"
    event: "French troops oust the Viet Minh from Hanoi; First Indochina War begins."

  - date: "Oct. 1, 1949"
    event: "Mao Tse-tung declares the People's Republic of China in Peking."

  - date: "Feb. 27, 1950"
    event: "NSCM 64 outlines U.S. policy to contain the spread of communism in Southeast Asia."

  - date: "June 25, 1950"
    event: "North Korean invasion of South Korea; United Nations troops committed to support the South (war ends July, 1953)."

  - date: "Aug. 3, 1950"
    event: "U.S. Military Assistance Advisory Group (MAAG) set up in Vietnam to coordinate U.S. aid to the French."

  - date: "Nov. 4, 1952"
    event: "Dwight D. Eisenhower elected President of the U.S."

  - date: "May 7, 1954"
    tier: 0
    event: "Dien Bien Phu falls to the Viet Minh after a 55-day siege."

  - date: "July 7, 1954"
    event: "Ngo Dinh Diem appointed Prime Minister of (South) Vietnam under the Emperor Bao Dai."

  - date: "July 20/21, 1954"
    tier: 0
    event: "Geneva Accords grant independence to Laos, Cambodia, and a divided Vietnam; First Indochina War ends."

