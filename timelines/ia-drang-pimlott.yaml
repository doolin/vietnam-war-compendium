the_war_years:
  - date: "July 29, 1965"
    event: "1st Brigade, 101st Airborne Division (Separate) arrives at Cam Ranh."
  - date: "Sept. 14, 1965"
    event: "1st Cavalry Division (Airmobile) arrives at An Khe."
  - date: "Oct. 15, 1965"
    event: "At a protest rally in the U.S., David Millar becomes the first man to burn his draft card. He is arrested."
  - date: "Oct. 15/16, 1965"
    event: "Relatively minor antiwar protests held in over 40 U.S. cities and various western European capitals."
  - date: "Oct. 20, 1965"
    event: "NVA attack on Plei Me Special Forces camp, Central Highlands."
  - date: "Nov. 14, 1965"
    tier: 0
    event: "1/7th Cavalry assault LZ X-Ray, Ia Drang valley."
  - date: "Nov. 27, 1965"
    event: "Pentagon calls for a troop buildup in Vietnam in 1966 to nearly 400,000 men."
  - date: "Dec. 25, 1965"
    event: "President Johnson suspends Rolling Thunder air attacks on the North to induce negotiations. Bombing resumes January 31, 1966."
  - date: "Jan. 19, 1966"
    event: "President Johnson asks Congress for an additional $12.8 billion for the war in Vietnam."
  - date: "Jan. 24, 1966"
    event: "Operation Masher/White Wing begins in IICTZ (ends March 6)."
  - date: "Feb 6/8, 1966"
    event: "Honolulu Conference: President Johnson reaffirms U.S. support to South Vietnam."

