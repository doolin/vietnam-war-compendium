the_war_years:
  - date: "March 8, 1965"
    tier: 0
    event: "U.S. Marines go ashore at Da Nang: the first Marine combat ground troops to be deployed to Vietnam."
  - date: "April 1, 1965"
    event: "General Westmoreland persuades President Johnson to increase U.S. force levels in Vietnam to 33,000 men."
  - date: "April 22, 1965"
    event: "First clash between U.S. Marine ground troops and VC guerrillas, at Binh Thai."
  - date: "April 24, 1965"
    event: "Johnson officially designates Vietnam a \"combat zone\" for U.S. forces."
  - date: "May 7, 1965"
    event: "3,500 men of the 173d Airborne Brigade arrive in Bien Hoa."
  - date: "June 10/13, 1965"
    event: "Battle between Army Special Forces, U.S. sailors, native mercenaries and VC at Dong Xoai; U.S. airpower crucial."
  - date: "June 18, 1965"
    event: "Air Marshal Nguyen Cao Ky appointed premier of South Vietnam."
  - date: "July 1, 1965"
    event: "U.S. Marines land at Qui Nhon in Binh Dinh province."
  - date: "July 12, 1965"
    event: "U.S. Marine Lieutenant Frank S. Reasoner killed in action; later awarded the first Medal of Honor of the Vietnam War."
  - date: "July 28, 1965"
    event: "Johnson promises to increase U.S. force levels in Vietnam to 125,000 men (confirmed at Honolulu, early August)."
