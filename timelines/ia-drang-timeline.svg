<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850" width="11in" height="8.5in">
  <title>Vietnam War Timeline — Ia Drang (1965–1966)</title>
  <style><![CDATA[.axis { stroke: #333; stroke-width: 1; fill: none; }
.tick { stroke: #333; stroke-width: 1; }
.tick-month { stroke: #555; stroke-width: 0.75; }
.event-line { stroke: #666; stroke-width: 0.5; stroke-dasharray: 2,2; }
.event-dot { fill: #c00; }
.event-box { fill: #fff; stroke: #999; stroke-width: 0.75; }
.event-text { font-family: Georgia, serif; font-size: 12px; fill: #1a1a1a; }
.year-label { font-family: Georgia, serif; font-size: 16px; font-weight: bold; fill: #1a1a1a; }
.month-label { font-family: Georgia, serif; font-size: 11px; fill: #444; }
]]></style>
  <line class="axis" x1="80" y1="800" x2="1020" y2="800"/>
  <line class="tick" x1="80.0" y1="800" x2="80.0" y2="808"/>
  <text class="year-label" x="80.0" y="828" text-anchor="middle">1965</text>
  <line class="tick" x1="550.6447187928669" y1="800" x2="550.6447187928669" y2="808"/>
  <text class="year-label" x="550.6447187928669" y="828" text-anchor="middle">1966</text>
  <line class="tick" x1="1020.0" y1="800" x2="1020.0" y2="808"/>
  <text class="year-label" x="1020.0" y="828" text-anchor="middle">1967</text>
  <line class="tick-month" x1="196.04938271604937" y1="800" x2="196.04938271604937" y2="804"/>
  <text class="month-label" x="196.04938271604937" y="812" text-anchor="middle">April</text>
  <line class="tick-month" x1="313.33447645176045" y1="800" x2="313.33447645176045" y2="804"/>
  <text class="month-label" x="313.33447645176045" y="812" text-anchor="middle">July</text>
  <line class="tick-month" x1="431.9627343392776" y1="800" x2="431.9627343392776" y2="804"/>
  <text class="month-label" x="431.9627343392776" y="812" text-anchor="middle">October</text>
  <line class="tick-month" x1="666.6941015089163" y1="800" x2="666.6941015089163" y2="804"/>
  <text class="month-label" x="666.6941015089163" y="812" text-anchor="middle">April</text>
  <line class="tick-month" x1="783.9791952446274" y1="800" x2="783.9791952446274" y2="804"/>
  <text class="month-label" x="783.9791952446274" y="812" text-anchor="middle">July</text>
  <line class="tick-month" x1="902.6074531321445" y1="800" x2="902.6074531321445" y2="804"/>
  <text class="month-label" x="902.6074531321445" y="812" text-anchor="middle">October</text>
  <rect class="event-box" x="259.4387288523091" y="676" width="180" height="72"/>
  <line class="event-line" x1="349.4387288523091" y1="800" x2="349.4387288523091" y2="750"/>
  <circle class="event-dot" cx="349.4387288523091" cy="750" r="3"/>
  <text class="event-text" x="349.4387288523091" y="693" text-anchor="middle">Jul 29, 1965</text>
  <text class="event-text" x="349.4387288523091" y="711" text-anchor="middle">1st Brigade, 101st Airborne</text>
  <text class="event-text" x="349.4387288523091" y="725" text-anchor="middle">Division (Separate) arrives</text>
  <text class="event-text" x="349.4387288523091" y="739" text-anchor="middle">at Cam Ranh.</text>
  <rect class="event-box" x="320.0422953818016" y="634" width="180" height="72"/>
  <line class="event-line" x1="410.0422953818016" y1="800" x2="410.0422953818016" y2="708"/>
  <circle class="event-dot" cx="410.0422953818016" cy="708" r="3"/>
  <text class="event-text" x="410.0422953818016" y="651" text-anchor="middle">Sep 14, 1965</text>
  <text class="event-text" x="410.0422953818016" y="669" text-anchor="middle">1st Cavalry Division</text>
  <text class="event-text" x="410.0422953818016" y="683" text-anchor="middle">(Airmobile) arrives at An</text>
  <text class="event-text" x="410.0422953818016" y="697" text-anchor="middle">Khe.</text>
  <rect class="event-box" x="360.0148605395519" y="578" width="180" height="86"/>
  <line class="event-line" x1="450.0148605395519" y1="800" x2="450.0148605395519" y2="666"/>
  <circle class="event-dot" cx="450.0148605395519" cy="666" r="3"/>
  <text class="event-text" x="450.0148605395519" y="595" text-anchor="middle">Oct 15, 1965</text>
  <text class="event-text" x="450.0148605395519" y="613" text-anchor="middle">At a protest rally in the</text>
  <text class="event-text" x="450.0148605395519" y="627" text-anchor="middle">U.S., David Millar becomes</text>
  <text class="event-text" x="450.0148605395519" y="641" text-anchor="middle">the first man to burn his</text>
  <text class="event-text" x="450.0148605395519" y="655" text-anchor="middle">draft card. He is arrested.</text>
  <rect class="event-box" x="360.0148605395519" y="536" width="180" height="86"/>
  <line class="event-line" x1="450.0148605395519" y1="800" x2="450.0148605395519" y2="624"/>
  <circle class="event-dot" cx="450.0148605395519" cy="624" r="3"/>
  <text class="event-text" x="450.0148605395519" y="553" text-anchor="middle">Oct 15, 1965</text>
  <text class="event-text" x="450.0148605395519" y="571" text-anchor="middle">Relatively minor antiwar</text>
  <text class="event-text" x="450.0148605395519" y="585" text-anchor="middle">protests held in over 40</text>
  <text class="event-text" x="450.0148605395519" y="599" text-anchor="middle">U.S. cities and various</text>
  <text class="event-text" x="450.0148605395519" y="613" text-anchor="middle">western European capitals.</text>
  <rect class="event-box" x="366.4620484682213" y="508" width="180" height="72"/>
  <line class="event-line" x1="456.4620484682213" y1="800" x2="456.4620484682213" y2="582"/>
  <circle class="event-dot" cx="456.4620484682213" cy="582" r="3"/>
  <text class="event-text" x="456.4620484682213" y="525" text-anchor="middle">Oct 20, 1965</text>
  <text class="event-text" x="456.4620484682213" y="543" text-anchor="middle">NVA attack on Plei Me</text>
  <text class="event-text" x="456.4620484682213" y="557" text-anchor="middle">Special Forces camp, Central</text>
  <text class="event-text" x="456.4620484682213" y="571" text-anchor="middle">Highlands.</text>
  <rect class="event-box" x="398.7517146776406" y="480" width="180" height="58"/>
  <line class="event-line" x1="488.7517146776406" y1="800" x2="488.7517146776406" y2="540"/>
  <circle class="event-dot" cx="488.7517146776406" cy="540" r="3"/>
  <text class="event-text" x="488.7517146776406" y="497" text-anchor="middle">Nov 14, 1965</text>
  <text class="event-text" x="488.7517146776406" y="515" text-anchor="middle">1/7th Cavalry assault LZ</text>
  <text class="event-text" x="488.7517146776406" y="529" text-anchor="middle">X-Ray, Ia Drang valley.</text>
  <rect class="event-box" x="415.51440329218104" y="424" width="180" height="72"/>
  <line class="event-line" x1="505.51440329218104" y1="800" x2="505.51440329218104" y2="498"/>
  <circle class="event-dot" cx="505.51440329218104" cy="498" r="3"/>
  <text class="event-text" x="505.51440329218104" y="441" text-anchor="middle">Nov 27, 1965</text>
  <text class="event-text" x="505.51440329218104" y="459" text-anchor="middle">Pentagon calls for a troop</text>
  <text class="event-text" x="505.51440329218104" y="473" text-anchor="middle">buildup in Vietnam in 1966</text>
  <text class="event-text" x="505.51440329218104" y="487" text-anchor="middle">to nearly 400,000 men.</text>
  <rect class="event-box" x="451.6186556927298" y="354" width="180" height="100"/>
  <line class="event-line" x1="541.6186556927298" y1="800" x2="541.6186556927298" y2="456"/>
  <circle class="event-dot" cx="541.6186556927298" cy="456" r="3"/>
  <text class="event-text" x="541.6186556927298" y="371" text-anchor="middle">Dec 25, 1965</text>
  <text class="event-text" x="541.6186556927298" y="389" text-anchor="middle">President Johnson suspends</text>
  <text class="event-text" x="541.6186556927298" y="403" text-anchor="middle">Rolling Thunder air attacks</text>
  <text class="event-text" x="541.6186556927298" y="417" text-anchor="middle">on the North to induce</text>
  <text class="event-text" x="541.6186556927298" y="431" text-anchor="middle">negotiations. Bombing</text>
  <text class="event-text" x="541.6186556927298" y="445" text-anchor="middle">resumes January 31, 1966.</text>
  <rect class="event-box" x="483.8545953360767" y="326" width="180" height="86"/>
  <line class="event-line" x1="573.8545953360767" y1="800" x2="573.8545953360767" y2="414"/>
  <circle class="event-dot" cx="573.8545953360767" cy="414" r="3"/>
  <text class="event-text" x="573.8545953360767" y="343" text-anchor="middle">Jan 19, 1966</text>
  <text class="event-text" x="573.8545953360767" y="361" text-anchor="middle">President Johnson asks</text>
  <text class="event-text" x="573.8545953360767" y="375" text-anchor="middle">Congress for an additional</text>
  <text class="event-text" x="573.8545953360767" y="389" text-anchor="middle">$12.8 billion for the war in</text>
  <text class="event-text" x="573.8545953360767" y="403" text-anchor="middle">Vietnam.</text>
  <rect class="event-box" x="490.3017832647463" y="298" width="180" height="72"/>
  <line class="event-line" x1="580.3017832647463" y1="800" x2="580.3017832647463" y2="372"/>
  <circle class="event-dot" cx="580.3017832647463" cy="372" r="3"/>
  <text class="event-text" x="580.3017832647463" y="315" text-anchor="middle">Jan 24, 1966</text>
  <text class="event-text" x="580.3017832647463" y="333" text-anchor="middle">Operation Masher/White Wing</text>
  <text class="event-text" x="580.3017832647463" y="347" text-anchor="middle">begins in IICTZ (ends March</text>
  <text class="event-text" x="580.3017832647463" y="361" text-anchor="middle">6).</text>
  <rect class="event-box" x="507.06447187928666" y="242" width="180" height="86"/>
  <line class="event-line" x1="597.0644718792867" y1="800" x2="597.0644718792867" y2="330"/>
  <circle class="event-dot" cx="597.0644718792867" cy="330" r="3"/>
  <text class="event-text" x="597.0644718792867" y="259" text-anchor="middle">Feb 6, 1966</text>
  <text class="event-text" x="597.0644718792867" y="277" text-anchor="middle">Honolulu Conference:</text>
  <text class="event-text" x="597.0644718792867" y="291" text-anchor="middle">President Johnson reaffirms</text>
  <text class="event-text" x="597.0644718792867" y="305" text-anchor="middle">U.S. support to South</text>
  <text class="event-text" x="597.0644718792867" y="319" text-anchor="middle">Vietnam.</text>
</svg>
