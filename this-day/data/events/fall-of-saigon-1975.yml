# Events from the final collapse of South Vietnam, 1975
# Source: "Final Fiasco: The Fall of Saigon" by Edward Rasen, HistoryNet
#         https://historynet.com/final-fiasco-the-fall-of-saigon/

- month: 1
  day: 6
  year: 1975
  title: "PAVN captures Phuoc Long province"
  body: "<p>After a month-long battle, People's Army of Vietnam units captured Phuoc Long, a provincial capital just 75 miles north of Saigon. It was the first province lost entirely by South Vietnam since the 1973 Paris Peace Accords. The lack of any American response confirmed Hanoi's assessment that the United States would not re-intervene.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
      url: "https://historynet.com/final-fiasco-the-fall-of-saigon/"
    - label: "Decent Interval by Frank Snepp"
      url: "https://www.amazon.com/dp/0700612459"

- month: 3
  day: 12
  year: 1975
  title: "PAVN captures Buon Ma Thuot"
  body: "<p>The People's Army of Vietnam captured Buon Ma Thuot, the strategic provincial capital on the southern edge of the Central Highlands. The fall of this key city triggered a chain reaction of military and political decisions that would lead to the collapse of South Vietnam in less than seven weeks.</p><p>President Thieu responded by conceiving a strategy he called 'light at the top, heavy at the bottom' — withdrawing forces from the northern provinces to consolidate around Saigon. The retreat quickly became a rout.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
      url: "https://historynet.com/final-fiasco-the-fall-of-saigon/"
    - label: "Decent Interval by Frank Snepp"
      url: "https://www.amazon.com/dp/0700612459"

- month: 3
  day: 13
  year: 1975
  title: "South Vietnamese paratroopers repel attack near the DMZ"
  body: "<p>South Vietnamese paratroopers repelled an enemy attack east of Route 1 from the demilitarized zone, one of the last successful defensive actions as the military situation deteriorated across the country. Within days, President Thieu's decision to withdraw from the Central Highlands would turn a local defeat into a national catastrophe.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
      url: "https://historynet.com/final-fiasco-the-fall-of-saigon/"

- month: 3
  day: 14
  year: 1975
  title: "Thieu orders withdrawal from the Central Highlands"
  body: "<p>President Nguyen Van Thieu conceived the strategy he called 'light at the top, heavy at the bottom' — abandoning the northern provinces and Central Highlands to consolidate South Vietnamese forces around Saigon and the Mekong Delta. The withdrawal, poorly planned and executed in secrecy, quickly became a chaotic rout as soldiers and civilians fled south together.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
      url: "https://historynet.com/final-fiasco-the-fall-of-saigon/"
    - label: "Decent Interval by Frank Snepp"
      url: "https://www.amazon.com/dp/0700612459"

- month: 3
  day: 25
  year: 1975
  title: "South Vietnamese army disintegrates in retreat"
  body: "<p>By late March, approximately 150,000 South Vietnamese soldiers had been annihilated or simply disappeared in the chaotic withdrawal from the Central Highlands and northern provinces. What President Thieu had envisioned as a strategic redeployment had become a catastrophic rout, with entire divisions ceasing to exist as fighting units.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
      url: "https://historynet.com/final-fiasco-the-fall-of-saigon/"

- month: 3
  day: 31
  year: 1975
  title: "Colonel LeGro warns defeat is inevitable"
  body: "<p>Colonel William LeGro, the senior U.S. intelligence officer remaining in Vietnam, told General Frederick Weyand that it was 'already too late' to prevent South Vietnam's defeat. That same day, the Provisional Revolutionary Government announced its willingness to discuss talks with South Vietnamese leaders — terms that amounted to a demand for surrender.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
      url: "https://historynet.com/final-fiasco-the-fall-of-saigon/"

- month: 4
  day: 2
  year: 1975
  title: "South Vietnam's National Assembly turns on Thieu"
  body: "<p>South Vietnam's National Assembly accused President Thieu of abuse of power and demanded his removal, as the military situation deteriorated beyond recovery. CIA Station Chief Thomas Polgar warned the White House that collapse was imminent. The political disintegration mirrored the military collapse already underway across the country.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
      url: "https://historynet.com/final-fiasco-the-fall-of-saigon/"

- month: 4
  day: 5
  year: 1975
  title: "General Weyand reports privately to Ford and Kissinger"
  body: "<p>General Frederick Weyand, just returned from Saigon, reported privately to President Ford and Secretary of State Kissinger at Palm Springs. His assessment was grim: South Vietnam was collapsing and only massive American aid could change the outcome. Ford would soon ask Congress for $722 million in emergency military assistance — a request Congress would reject.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
      url: "https://historynet.com/final-fiasco-the-fall-of-saigon/"

- month: 4
  day: 10
  year: 1975
  title: "Ford asks Congress for $722 million in emergency aid"
  body: "<p>In a televised address, President Gerald Ford asked Congress for $722 million in emergency military assistance for South Vietnam, warning that the fall of Saigon was imminent without American support. Congress, weary of the war and skeptical that more money could change the outcome, would ultimately reject the request.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
      url: "https://historynet.com/final-fiasco-the-fall-of-saigon/"

- month: 4
  day: 16
  year: 1975
  title: "Phan Rang defense line collapses; Senate rejects emergency aid"
  body: "<p>The defense line at Phan Rang — the last hope for a shortened, defensible perimeter around Saigon — was penetrated by North Vietnamese forces. The same day, the Senate Armed Forces Committee formally rejected President Ford's request for $722 million in emergency military aid to South Vietnam, sealing the country's fate.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
      url: "https://historynet.com/final-fiasco-the-fall-of-saigon/"

- month: 4
  day: 21
  year: 1975
  title: "President Thieu resigns"
  body: "<p>President Nguyen Van Thieu announced his resignation at noon in a bitter, tearful television address, denouncing the United States for abandoning South Vietnam. He handed control to Vice President Tran Van Huong, who would himself hand power to General Duong Van Minh just days before the end. Thieu soon fled the country with a reported fortune in gold.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
      url: "https://historynet.com/final-fiasco-the-fall-of-saigon/"
    - label: "Decent Interval by Frank Snepp"
      url: "https://www.amazon.com/dp/0700612459"

- month: 4
  day: 24
  year: 1975
  title: "Ford declares the war 'finished' at Tulane University"
  body: "<p>President Gerald Ford delivered a speech at Tulane University in which he declared that the Vietnam War was 'finished as far as America is concerned.' The student audience erupted in applause. In Saigon, Americans still awaiting evacuation heard the speech with a mixture of relief and dread.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Final Fiasco: The Fall of Saigon by Edward Rasen, HistoryNet"
