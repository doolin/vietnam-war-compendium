- month: 2
  day: 20
  year: 1971
  title: "UH-1C gunship crew lost during Lam Son 719 resupply mission"
  body: "<p>On February 20, 1971, a UH-1C helicopter from the 48th Aviation Company ('Jokers'), 223rd Aviation Battalion, 1st Aviation Brigade, was shot down by hostile fire while providing gun cover for an emergency resupply mission 20 miles southeast of Sepone, Laos, during Operation Lam Son 719.</p><p>All four crew members remain unaccounted-for: WO Jon E. Reid (pilot), 1LT David M. May (co-pilot), SP5 Randall L. Johnson (crew chief), and SP4 Robert J. Acalotto (door gunner, Greensburg, PA). Two people were seen exiting the crashed aircraft and running toward nearby trees, but their identities could not be confirmed. Rescue attempts failed due to heavy enemy fire. No remains have been recovered.</p>"
  photo_url:
  photo_alt:
