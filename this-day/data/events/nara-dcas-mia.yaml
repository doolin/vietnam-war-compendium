- month: 5
  day: 20
  year: 1968
  title: "MACV-SOG Strike Team Idaho vanishes in Laos"
  body: "<p>On May 20, 1968, Strike Team Idaho was inserted by H-34 Kingbee helicopter into the A Shau Valley, Laos, on a reconnaissance patrol for MACV-SOG out of FOB 1, Phu Bai. The team reported 'Team OK' after insertion but then failed to make scheduled radio contact with Forward Air Controllers. By nightfall, no communication had been established.</p><p>A Bright Light rescue mission (ST Oregon) was launched to locate the team but encountered overwhelming enemy forces. Searchers found what appeared to be a trail in the grass and evidence of M-26 grenade fragments and CAR-15 gunfire, suggesting ST Idaho had been wiped out or captured. Neither outcome was confirmed.</p><p>The two American team members remain unaccounted-for with no remains recovered: MSG Glen Oliver Lane (One-Zero, Odessa, TX), an Infantry Operations and Intelligence Specialist, and SFC Robert Duval Owen (One-One, Chatham, VA), a Radio Operator. Four South Vietnamese indigenous troops were also lost. Lane was declared dead June 1, 1974; Owen on November 1, 1973.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "NARA DCAS Vietnam Conflict Extract Data File (NAID 2240992)"
      url: "https://catalog.archives.gov/id/2240992"
    - label: "ST Idaho Still Missing — MACV-SOG"
