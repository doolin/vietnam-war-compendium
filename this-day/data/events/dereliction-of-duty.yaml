# Events from Dereliction of Duty by H.R. McMaster
# Source: kindle-highlights/dereliction-of-duty.yaml (quality-5 highlights)

- month: 11
  day: 26
  year: 1963
  title: "NSAM 273 issued after Kennedy assassination"
  body: "<p>National Security Action Memorandum 273 was issued on November 26, 1963, four days after President Kennedy's assassination. The JCS would later reference NSAM 273 in a January 22, 1964 memorandum to McNamara on Vietnam and Southeast Asia.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 1
  day: 22
  year: 1964
  title: "JCS send McNamara memorandum on Vietnam"
  body: "<p>On January 22, 1964, the Joint Chiefs of Staff sent Secretary of Defense McNamara a memorandum on Vietnam and Southeast Asia that referenced NSAM 273 of November 26, 1963.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 4
  day: 19
  year: 1964
  title: "Rusk and Wheeler travel to Saigon to discuss OPLAN 37-64"
  body: "<p>On April 19 and 20, Secretary of State Rusk, General Wheeler, and Assistant Secretary of State for Far Eastern Affairs William Bundy traveled to Saigon to discuss OPLAN 37-64 with Ambassador Lodge.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 5
  day: 13
  year: 1964
  title: "Wall Street Journal criticizes lack of U.S. strategy in Vietnam"
  body: "<p>A May 13 editorial in the Wall Street Journal titled \"Error Upon Error\" observed that \"it is almost impossible to figure out what is the U.S. strategy,\" and declared that \"the evidence indicates the lack of any plan.\"</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 5
  day: 19
  year: 1964
  title: "U.S. begins reconnaissance flights over Laos"
  body: "<p>The United States began photo and reconnaissance flights over Laos on May 19 to track the fighting between government forces and Pathet Lao guerrillas on the Plain of Jars.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 5
  day: 25
  year: 1964
  title: "NSC Executive Committee refines graduated pressure memo"
  body: "<p>On May 25 the Executive Committee of the NSC prepared a memo entitled \"Basic Recommendations and Projected Course of Action on Southeast Asia,\" which refined McNamara's earlier memo on graduated pressure.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 6
  day: 6
  year: 1964
  title: "Pathet Lao shoots down U.S. reconnaissance jet over Laos"
  body: "<p>On June 6 the Pathet Lao shot down a U.S. photo reconnaissance jet over Laos. The United States had begun these flights on May 19 to track fighting between government forces and Pathet Lao guerrillas on the Plain of Jars.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 7
  day: 7
  year: 1964
  title: "Ambassador Taylor arrives in Saigon, reorganizes mission"
  body: "<p>Ambassador Maxwell Taylor arrived in Saigon on July 7, 1964. He wasted no time exercising his broad license, cabling that he was reorganizing operations in Saigon \"under direction of a U.S. Mission Council over which I will preside.\"</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 7
  day: 22
  year: 1964
  title: "JCS authorize DESOTO patrol in Gulf of Tonkin"
  body: "<p>On July 22 the Joint Chiefs authorized a July 31 DESOTO patrol to assess North Vietnamese naval capability. Separately, on the night of July 30-31, under orders from General Westmoreland, four MAROPS patrol boats departed Danang for targets on the islands of Hon Me and Hon Nieu in the Gulf of Tonkin.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 8
  day: 2
  year: 1964
  title: "North Vietnamese torpedo boats attack USS Maddox"
  body: "<p>At 3:40 P.M. Saigon time on August 2, CINCPAC Admiral Sharp sent a flash message to Admiral McDonald and the Joint Chiefs reporting that three torpedo boats had attacked the Navy destroyer Maddox in the Gulf of Tonkin.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 8
  day: 3
  year: 1964
  title: "MAROPS boats shell North Vietnamese targets after Tonkin incident"
  body: "<p>After midnight on August 3, two PT boats poured 770 rounds of high-explosive munitions into the North Vietnamese radar facility near Vinh Son. Another boat illuminated and shelled a security post near the mouth of the Ron River, leaving it in flames.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 8
  day: 6
  year: 1964
  title: "Wheeler, McNamara, and Rusk testify on Tonkin Gulf"
  body: "<p>On August 6 General Wheeler accompanied McNamara and Rusk to a joint session of the Senate Foreign Relations and Armed Services Committees to testify on the Gulf of Tonkin incidents.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 9
  day: 10
  year: 1964
  title: "Johnson signs NSAM 314 approving resumed naval patrols"
  body: "<p>On September 10, 1964, President Johnson signed NSAM 314 approving the resumption of U.S. naval patrols in the Gulf of Tonkin, 34A operations including maritime raids, air drops, and leaflet operations, and planning for South Vietnamese cross-border air and ground operations into Laos.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 11
  day: 25
  year: 1964
  title: "New York Times editorial questions expanding war"
  body: "<p>A November 25 New York Times editorial reminded readers of the president's campaign remarks and suggested: \"If there is to be a new policy now, if an Asian war is to be converted into an American war, the country has a right to insist that it be told what has changed so profoundly in the past two months to justify it.\"</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 1
  day: 28
  year: 1965
  title: "Wheeler orders Sharp to resume DESOTO patrols"
  body: "<p>On January 28, General Wheeler ordered Admiral Sharp to resume DESOTO patrols on February 3. They would be the first since September 1964.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 2
  day: 1
  year: 1965
  title: "Johnson warns JCS that bombing could cause Chinese intervention"
  body: "<p>On February 1, 1965, President Johnson warned the Joint Chiefs that any direct military pressure against North Vietnam could cause Chinese intervention.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 2
  day: 10
  year: 1965
  title: "Viet Cong bomb American barracks at Qui Nhon"
  body: "<p>On February 10, Viet Cong terrorists bombed an American enlisted soldiers' barracks in the coastal city of Qui Nhon.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 2
  day: 18
  year: 1965
  title: "JCS issue execute order for Rolling Thunder I"
  body: "<p>On February 18, one week after submitting a compromise memo to McNamara, the JCS issued the execute order for Rolling Thunder I. United States and South Vietnamese aircraft were to strike a North Vietnamese naval base on February 20.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 4
  day: 6
  year: 1965
  title: "Johnson approves expanded Marine mission in Vietnam"
  body: "<p>In an NSAM issued on April 6, President Johnson approved a change of mission for all Marine battalions deployed to Vietnam to permit their more active use under conditions to be established and approved by the Secretary of Defense in consultation with the Secretary of State.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 4
  day: 8
  year: 1965
  title: "Johnson demands results from JCS under bombing restrictions"
  body: "<p>On April 8, 1965, the day after his Johns Hopkins speech, President Johnson met with the JCS, McNamara, and Deputy Secretary of Defense Vance. The president was determined to avoid any discussion of the bombing of North Vietnam and made it clear to the Chiefs that he expected results in Vietnam even under the restrictions he had placed on air and ground operations.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 4
  day: 14
  year: 1965
  title: "Wheeler relays Johnson's decisions to CINCPAC and MACV"
  body: "<p>On April 14, General Wheeler sent a message to CINCPAC, MACV, and the Saigon embassy detailing the decisions that the president had made in his April 13 meeting with the JCS.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 5
  day: 8
  year: 1965
  title: "CIA Director Raborn warns Johnson of quagmire"
  body: "<p>On May 8, DCI Raborn wrote to President Johnson predicting, based largely on the French experience, that \"we will find ourselves pinned down, with little choice left among possible subsequent courses of action: i.e. disengagement at very high cost or broadening the conflict in quantum jumps.\"</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 5
  day: 10
  year: 1965
  title: "Johnson approves bombing pause code-named Mayflower"
  body: "<p>On May 10, President Johnson approved a five-to-seven-day bombing pause, code-named Mayflower.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 6
  day: 11
  year: 1965
  title: "Civilian government falls in South Vietnam"
  body: "<p>On June 11, Prime Minister Quat ceded the Saigon government to the military and the eight-month interlude of civilian rule in South Vietnam ended, never to return.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 6
  day: 18
  year: 1965
  title: "Johnson approves 1st Cavalry Division deployment to Vietnam"
  body: "<p>On June 18, President Johnson formally approved a portion of Westmoreland's troop request. The airmobile 1st Cavalry Division, comprising nine battalions and 23,000 troops, would be sent to South Vietnam.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 6
  day: 23
  year: 1965
  title: "George Ball recommends U.S. cut losses in Vietnam"
  body: "<p>On June 23, Under Secretary of State George Ball recommended that the United States cut its losses in Vietnam.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 7
  day: 1
  year: 1965
  title: "McGeorge Bundy sends Johnson competing Vietnam policy papers"
  body: "<p>Before President Johnson met with his advisers on July 1, McGeorge Bundy sent him a memorandum attaching Vietnam policy papers from McNamara and Ball, and from Rusk and William Bundy.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 7
  day: 8
  year: 1965
  title: "Johnson approves thirty-four battalion deployment to Vietnam"
  body: "<p>On July 8, President Johnson approved the deployment to South Vietnam of the full thirty-four battalions that General Westmoreland had requested.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 7
  day: 2
  year: 1965
  title: "Wheeler secretly tasks committee to assess winning prospects"
  body: "<p>Since July 2, an ad hoc committee under General Goodpaster's direction had been charged by General Wheeler with determining what \"assurance the U.S. can have of winning if we do everything we can.\" Marine Commandant Greene would not discover this committee's existence until July 12.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 7
  day: 23
  year: 1965
  title: "JCS realize domestic politics overwhelm Vietnam planning"
  body: "<p>By Friday night, July 23, it had finally become clear to the Joint Chiefs of Staff that the president's domestic political priorities had overwhelmed the assumptions on which they had based Vietnam planning.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
      url: "https://www.goodreads.com/book/show/422680.Dereliction_of_Duty"

- month: 7
  day: 27
  year: 1965
  title: "Johnson lobbies NSC and Congress before announcing escalation"
  body: "<p>On the evening of July 27, before making public his decision, President Johnson made one last effort to soften up his own NSC and selected members of Congress.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Dereliction of Duty by H.R. McMaster"
