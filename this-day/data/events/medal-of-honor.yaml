  day: 23
  year: 1971
  title: Specialist Fourth Class Michael John Fitzmaurice earns Medal of Honor
  body: "<p>For conspicuous gallantry and intrepidity in action at the risk of his
    life above and beyond the call of duty. Sp4c. Fitzmaurice, 3d Platoon, Troop D,
    distinguished himself at Khe Sanh. Sp4c. Fitzmaurice and 3 fellow soldiers were
    occupying a bunker when a company of North Vietnamese sappers infiltrated the
    area. At the onset of the attack Sp4c.</p>"
