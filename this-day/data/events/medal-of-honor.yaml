  title: Staff Sergeant Peter S. Connor earns Medal of Honor (posthumous)
  body: "<p>For conspicuous gallantry and intrepidity in action against enemy Viet
    Cong forces at the risk of his life above and beyond the call of duty. Leading
    his platoon on a search and destroy operation in an area made particularly hazardous
