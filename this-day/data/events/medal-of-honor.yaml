- month: 2
  day: 23
  year: 1971
  title: Specialist Fourth Class Larry G. Dahl earns Medal of Honor (posthumous)
  body: "<p>Sp4c. Dahl distinguished himself by conspicuous gallantry and intrepidity
    while serving as a machine gunner on a gun truck near An Khe, Binh Dinh Province.
    The gun truck in which Sp4c. Dahl was riding was sent with 2 other gun trucks
    to assist in the defense of a convoy that had been ambushed by an enemy force.</p>"
  photo_url:
