  body: "<p>For conspicuous gallantry and intrepidity in action at the risk of his
    life above and beyond the call of duty. 1st Lt. Gardner's platoon was advancing
    to relieve a company of the 1st Battalion that had been pinned down for several
    hours by a numerically superior enemy force in the village of My Canh, Vietnam.</p>"
