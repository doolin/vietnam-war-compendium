- month: 7
  day: 12
  year: 1965
  title: First Lieutenant Frank S. Reasoner earns Medal of Honor (posthumous)
  body: "<p>For conspicuous gallantry and intrepidity at the risk of his life above
    and beyond the call of duty. The reconnaissance patrol led by 1st Lt. Reasoner
    had deeply penetrated heavily controlled enemy territory when it came under extremely
    heavy fire from an estimated 50 to 100 Viet Cong insurgents.</p>"
  photo_url:
  photo_alt:
  references:
  - label: Medal of Honor Citation — Frank S. Reasoner (army.mil)
