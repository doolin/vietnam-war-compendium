  day: 22
  year: 1965
  title: Private First Class Milton L. Iii Olive earns Medal of Honor (posthumous)
  body: "<p>For conspicuous gallantry and intrepidity at the risk of his life above
    and beyond the call of duty. Private First Class Olive was a member of the 3d
    Platoon of Company B, as it moved through the jungle to find the Viet Cong operating
