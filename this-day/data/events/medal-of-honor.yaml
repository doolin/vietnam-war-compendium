- month: 6
  day: 29
  year: 1972
  title: Captain Steven L. Bennett earns Medal of Honor (posthumous)
  body: "<p>Capt. Bennett was the pilot of a light aircraft flying an artillery adjustment
    mission along a heavily defended segment of route structure. A large concentration
    of enemy troops was massing for an attack on a friendly unit. Capt. Bennett requested
    tactical air support but was advised that none was available.</p>"
