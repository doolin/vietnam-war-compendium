- month: 3
  day: 31
  year: 1971
  title: First Lieutenant Brian Miles Thacker earns Medal of Honor
  body: "<p>For conspicuous gallantry and intrepidity in action at the risk of his
    life above and beyond the call of duty. 1st Lt. Thacker, Field Artillery, Battery
    A, distinguished himself while serving as the team leader of an Integrated Observation
    System collocated with elements of 2 Army of the Republic of Vietnam units at
    Fire Base 6.</p>"
