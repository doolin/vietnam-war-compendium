- month: 2
  day: 26
  year: 1971
  title: Captain Jon E. Swanson earns Medal of Honor (posthumous)
  body: "<p>for conspicuous gallantry and intrepidity at the risk of his life above
    and beyond the call of duty: Captain Jon E. Swanson distinguished himself by acts
    of bravery on February 26, 1971, while flying an OH-6A aircraft in support of
    ARVN Task Force 333 in the Kingdom of Cambodia.</p>"
  photo_url:
