  day: 10
  year: 1965
  title: First Lieutenant (then 2d Lt.) Charles Q. Williams earns Medal of Honor
  body: "<p>1st Lt. Williams distinguished himself by conspicuous gallantry and intrepidity
    at the risk of his life above and beyond the call of duty while defending the
    Special Forces Camp against a violent attack by hostile forces that lasted for
    14 hours. 1st Lt.</p>"
