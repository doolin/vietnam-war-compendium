- month: 5
  day: 18
  year: 1966
  title: Staff Sergeant Jimmy G. Stewart earns Medal of Honor (posthumous)
  body: "<p>For conspicuous gallantry and intrepidity in action at the risk of his
    life above and beyond the call of duty. Early in the morning a reinforced North
    Vietnamese company attacked Company B, which was manning a defensive perimeter
