- month: 9
  day: 20
  year: 1965
  title: Sergeant Larry S. Pierce earns Medal of Honor (posthumous)
  body: "<p>For conspicuous gallantry and intrepidity at the risk of life above and
    beyond the call of duty. Sergeant. Pierce was serving as squad leader in a reconnaissance
    platoon when his patrol was ambushed by hostile forces. Through his inspiring
    leadership and personal courage, the squad succeeded in eliminating an enemy machinegun
    and routing the opposing force.</p>"
  photo_url:
  photo_alt:
  references:
  - label: Medal of Honor Citation — Larry S. Pierce (army.mil)
