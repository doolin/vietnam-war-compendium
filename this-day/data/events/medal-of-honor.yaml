- month: 4
  day: 13
  year: 1972
  title: Lieutenant Thomas R. Norris earns Medal of Honor
  body: "<p>Lt. Norris completed an unprecedented ground rescue of 2 downed pilots
    deep within heavily controlled enemy territory in Quang Tri Province. Lt. Norris,
    on the night of 10 April, led a 5-man patrol through 2,000 meters of heavily controlled
    enemy territory, located 1 of the downed pilots at daybreak, and returned to the
    Forward Operating Base (FOB).</p>"
  photo_url:
  photo_alt:
  references:
  - label: Medal of Honor Citation — Thomas R. Norris (army.mil)
    url: https://www.army.mil/medalofhonor/citations26.html

