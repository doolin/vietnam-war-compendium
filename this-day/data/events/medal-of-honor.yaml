- month: 8
  day: 7
  year: 1971
  title: First Lieutenant Loren D. Hagen earns Medal of Honor (posthumous)
  body: "<p>1st Lt. Hagen distinguished himself in action while serving as the team
    leader of a small reconnaissance team operating deep within enemy-held territory.
    At approximately 0630 hours on the morning of 7 August 1971 the small team came
    under a fierce assault by a superior-sized enemy force using heavy small arms,
    automatic weapons, mortar, and rocket fire. 1st Lt.</p>"
  photo_url:
