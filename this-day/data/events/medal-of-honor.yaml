  day: 26
  year: 1965
  title: Captain Humbert R. Versace earns Medal of Honor (posthumous)
  body: "<p>for conspicuous gallantry and intrepidity at the risk of his life above
    and beyond the call of duty: Captain Humbert R. Versace distinguished himself
    by extraordinary heroism during the period of 29 October 1963 to 26 September
    1965, while serving as S-2 Advisor, Military Assistance Advisory Group, Detachment
    52, Ca Mau, Republic of Vietnam.</p>"
