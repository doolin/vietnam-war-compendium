- month: 3
  day: 11
  year: 1970
  title: "GySgt Allan Jay Kellogg Jr. absorbs grenade blast to save fellow Marines"
  body: "<p>On the night of March 11, 1970, Gunnery Sergeant Allan Jay Kellogg Jr., serving as platoon sergeant with Company G, 2d Battalion, 5th Marines, 1st Marine Division, was leading a small unit evacuating a fallen comrade in Quang Nam Province when they came under heavy fire from a numerically superior enemy force. An enemy soldier hurled a hand grenade that glanced off Kellogg's chest. He forced the grenade into the mud, threw himself over it, and absorbed the full effects of the detonation with his body, preventing serious injury or death to several fellow Marines. Despite multiple injuries to his chest, right shoulder, and arm, he continued directing his men until all reached the company perimeter. Kellogg survived and was awarded the Medal of Honor.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Medal of Honor Citation — Allan Jay Kellogg Jr. (army.mil)"
      url: "https://www.army.mil/medalofhonor/citations25.html"

- month: 4
  day: 21
  year: 1967
  title: "PFC Gary W. Martini killed rescuing wounded Marines at Binh Son"
  body: "<p>On April 21, 1967, during Operation UNION, elements of Company F, 1st Battalion, 1st Marines, 1st Marine Division encountered a firmly entrenched enemy force at Binh Son. The enemy onslaught killed 14 and wounded 18 Marines, pinning the platoon behind a low paddy dike. Private First Class Gary W. Martini crawled into the open within 15 meters of the enemy, hurling grenades and killing several. Though he knew one Marine had already been killed attempting to reach the wounded, Martini raced through the fire-swept paddy and dragged a comrade to safety. Seriously wounded during this rescue, he went out again to reach another wounded Marine lying 20 meters from the enemy trench line. Mortally wounded, he called to his comrades to stay under cover and, through a final effort, moved the injured Marine to where he could be pulled to safety before succumbing to his wounds. He was posthumously awarded the Medal of Honor.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Medal of Honor Citation — Gary W. Martini (army.mil)"
      url: "https://www.army.mil/medalofhonor/citations26.html"
