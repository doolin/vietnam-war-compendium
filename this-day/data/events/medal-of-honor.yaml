- month: 5
  day: 25
  year: 1971
  title: Major William E. Adams earns Medal of Honor (posthumous)
  body: "<p>Maj. Adams distinguished himself on 25 May 1971 while serving as a helicopter
    pilot in Kontum Province in the Republic of Vietnam. On that date, Maj. Adams
    volunteered to fly a lightly armed helicopter in an attempt to evacuate 3 seriously
    wounded soldiers from a small fire base which was under attack by a large enemy
    force.</p>"
  photo_url:
  photo_alt:
  references:
  - label: Medal of Honor Citation — William E. Adams (army.mil)
    url: https://www.army.mil/medalofhonor/citations25.html

- month: 6
  day: 5
  year: 1971
  title: Staff Sergeant Jon R. Cavaiani earns Medal of Honor
  body: "<p>S/Sergeant. Cavaiani distinguished himself by conspicuous gallantry and
    intrepidity at the risk of life above and beyond the call of duty in action in
    the Republic of Vietnam on 4 and 5 June 1971 while serving as a platoon leader
    to a security platoon providing security for an isolated radio relay site located
    within enemy-held territory.</p>"
  photo_url:
  photo_alt:
  references:
