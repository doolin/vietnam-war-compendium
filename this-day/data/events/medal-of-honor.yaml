  day: 21
  year: 1966
  title: Sergeant David Charles Dolby earns Medal of Honor
  body: "<p>For conspicuous gallantry and intrepidity at the risk of life above and
    beyond the call of duty, when his platoon, while advancing tactically, suddenly
    came under intense fire from the enemy located on a ridge immediately to the front.
    Six members of the platoon were killed instantly and a number were wounded, including
    the platoon leader. Sergeant. Dolby's every move brought fire from the enemy.</p>"
  photo_url:
  photo_alt:
  references:
