- month: 8
  day: 18
  year: 1965
  title: Lance Corporal Joe C. Paul earns Medal of Honor (posthumous)
  body: "<p>For conspicuous gallantry and intrepidity at the risk of his life above
    and beyond the call of duty. In violent battle, L/Corporal. Paul's platoon sustained
    5 casualties as it was temporarily pinned down, by devastating mortar, recoilless
    rifle, automatic weapons, and rifle fire delivered by insurgent communist (Viet
    Cong) forces in well entrenched positions.</p>"
  photo_url:
  photo_alt:
  references:
  - label: Medal of Honor Citation — Joe C. Paul (army.mil)
    url: https://www.army.mil/medalofhonor/citations26.html

- month: 8
  day: 18
  year: 1965
  title: Sergeant (then Corporal.) Robert E. O'malley earns Medal of Honor
  body: "<p>For conspicuous gallantry and intrepidity in action against the communist
    (Viet Cong) forces at the risk of his life above and beyond the call of duty.
    While leading his squad in the assault against a strongly entrenched enemy force,
    his unit came under intense small-arms fire. With complete disregard for his personal
    safety, Sergeant.</p>"
  photo_url:
  photo_alt:
  references:
  - label: Medal of Honor Citation — Robert E. O'malley (army.mil)
