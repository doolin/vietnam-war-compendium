- month: 11
  day: 8
  year: 1965
  title: Specialist Sixth Class (then Sp5c) Lawrence Joel earns Medal of Honor
  body: "<p>For conspicuous gallantry and intrepidity at the risk of life above and
    beyond the call of duty. Sp6c. Joel demonstrated indomitable courage, determination,
    and professional skill when a numerically superior and well-concealed Viet Cong
    element launched a vicious attack which wounded or killed nearly every man in
    the lead squad of the company.</p>"
  photo_url:
