# Events from SOG Kontum by Joe Parnar and Robert Dumont
# Source: kindle-highlights/sog-kontum.yaml

- month: 1
  day: 24
  year: 1964
  title: "Joint Chiefs create MACV-SOG"
  body: "<p>The Joint Chiefs of Staff created the Studies and Observations Group (SOG) on January 24, 1964, as a subsidiary command of the Military Assistance Command, Vietnam (MACV).</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 6
  day: 13
  year: 1968
  title: "SOG chase medic Parnar flies on Ghost 153"
  body: "<p>Specialist 4 Joseph F. Parnar served as chase medic riding on Ghost 153 on June 13, 1968, supporting SOG recon team operations out of FOB-2 Kontum.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 6
  day: 14
  year: 1968
  title: "SOG Bright Light rescue mission launched for Kedenburg"
  body: "<p>Specialist 5 Thomas P. Cunningham served as a straphanger on Spike Team Illinois during a Bright Light rescue mission on June 14, 1968, searching for missing SOG operative John Kedenburg.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 11
  day: 10
  year: 1968
  title: "RT California ambushes NVA on Ho Chi Minh Trail"
  body: "<p>On November 10, 1968, the second day of a combat patrol mission in Target Area Juliett-9, RT California, led by One-Zero Staff Sergeant Joe Walker, set up an ambush along a branch of Highway 96, a main artery of the Ho Chi Minh Trail.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 11
  day: 18
  year: 1968
  title: "SOG chase medic's Huey shot down during SLAM VII"
  body: "<p>Staff Sergeant Anthony C. Dorff, serving as chase medic, was aboard a Huey helicopter that was shot down on November 18, 1968, during SOG's SLAM VII operation in the tri-border area near Kontum.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 12
  day: 30
  year: 1968
  title: "Bright Light platoon searches for PFC Scherdin in Cambodia"
  body: "<p>On December 30, 1968, a Bright Light recovery platoon was launched to search for Private First Class Robert Scherdin, who had gone missing during RT Vermont's mission in Cambodia.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 1
  day: 8
  year: 1969
  title: "SOG recon team extracted from Cambodia after Scherdin search"
  body: "<p>A chase medic picked up a recon team on January 8, 1969, in Cambodia that had been inserted four days previously to search for the body of Private Robert F. Scherdin, a SOG operative missing since late December 1968.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 1
  day: 28
  year: 1969
  title: "RT New Mexico inserted north of Dak Xou river"
  body: "<p>On January 28, 1969, a newly formed team, RT New Mexico, was inserted on a recon mission north of the Dak Xou river, a couple of kilometers east of Target Area Juliett-9, under the command of One-Zero Specialist 5 Larry A. Stephens.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 3
  day: 3
  year: 1969
  title: "NVA attacks Ben Het with Russian PT-76 tanks"
  body: "<p>On March 3, 1969, the isolated Special Forces camp at Ben Het was attacked by the North Vietnamese Army using Russian PT-76 tanks and BMP-40 armored personnel carriers.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 3
  day: 11
  year: 1969
  title: "RT New York inserted in Target Area Tango-7"
  body: "<p>On March 11, 1969, RT New York was inserted in Target Area Tango-7 to conduct an area reconnaissance.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 3
  day: 15
  year: 1969
  title: "Operation Nightcap begins near Ben Het"
  body: "<p>Operation Nightcap got underway when Company A was inserted by helicopter on March 15, 1969, along with RT Arizona, which provided reconnaissance capabilities and served as the eyes and ears of the SLAM company operating near the besieged Special Forces camp at Ben Het.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 3
  day: 26
  year: 1969
  title: "First Lieutenant Sheridan killed in action"
  body: "<p>First Lieutenant Robert E. Sheridan was killed in action on March 26, 1969, during a Hatchet Force operation in Target Area Lima-6 near Kontum.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 6
  day: 16
  year: 1969
  title: "Cobra pilot and co-pilot killed near Ben Het"
  body: "<p>On June 16, 1969, Cobra pilot Mark Clotfelter and his co-pilot Warrant Officer Michael Mahowald were killed in action while flying convoy support near the Special Forces camp at Ben Het during the siege of that camp.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""

- month: 4
  day: 30
  year: 1972
  title: "MACV-SOG deactivated"
  body: "<p>MACV-SOG was deactivated on April 30, 1972. Personnel returned to Fort Bragg, North Carolina. During its existence, twelve recon teams disappeared entirely, and eight men assigned to SOG received the Congressional Medal of Honor.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "SOG Kontum by Joe Parnar and Robert Dumont"
      url: ""
