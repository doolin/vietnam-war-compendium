  title: "Viet Minh seize Tchepone region after Japanese coup"
  body: "<p>Following the March 9, 1945 Japanese coup against the French colonial administration, the Viet Minh clamped their hold on the Tchepone region and its people. Tchepone would later become the site of Base Area 604, the main North Vietnamese logistic base on the Ho Chi Minh Trail.</p>"
