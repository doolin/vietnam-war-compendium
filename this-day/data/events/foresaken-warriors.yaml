- month: 7
  day: 30
  year: 1968
  title: "U.S. Mobile Riverine Force enters the U Minh Forest"
  body: "<p>The U.S. Naval Assault Flotilla One transported troops from the 9th Infantry Division's 2d Brigade into the U Minh Forest on July 30, 1968. Taking advantage of a huge fire in the spring of 1968, this was one of the only U.S. ground force operations conducted in the notoriously difficult U Minh.</p>"
  photo_url:
  photo_alt:
  references:
    - label: "Forsaken Warriors by Robert L. Tonsetic"
