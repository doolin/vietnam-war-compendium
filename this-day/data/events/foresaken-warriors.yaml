- month: 12
  day: 31
  year: 1968
  title: "U.S. gunship crew spots Nick Rowe escaping in the U Minh"
  body: "<p>On December 31, 1968, a U.S. gunship team working in the U Minh spotted a figure in black pajamas running through a relatively open swampy area. The figure was Special Forces Lieutenant Nick Rowe, who had escaped after more than five years as a prisoner of the Viet Cong.</p>"
  photo_url:
  photo_alt:
  references:
